records:
<ng-container *ngIf="{ records: recordStore.recordsReplay$ | async,
                       subCategoryId : productService.subCategoryReplay$ | async } as source">
    <div class="album py-5 bg-light">
        <div class="container">
            <div class="row">
                <div class="col-md-4" *ngFor="let record of source.records | productFilter : source?.subCategoryId | orderBy: order : false | paginate: config">
                    <app-record-item [record]="record"></app-record-item>
                </div>
            </div>
        </div>
        <pagination-controls (pageChange)="pageChanged($event)"></pagination-controls>
    </div>
</ng-container>
