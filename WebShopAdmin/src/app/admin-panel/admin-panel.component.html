<ng-container *ngIf="{categoris: categories$ | async} as source">
	<div class="header">
		<button mat-raised-button color="primary" (click)="logout()">Logga ut</button>
	</div>

	<!-- Items menu -->
    <div class="container-fluid">
		<div class="row">
			<div class="col-2">
				<h1>Record Register</h1>
				<ul *ngFor="let category of source.categoris ">
					<li [routerLink]="['/adminpanel/tables/products/'+category.route]" [replaceUrl]="true"  (click)=recordTableService.refreshMatTable(category.route)>{{category.name}}</li>
				</ul>
				<ul>
					<li [routerLink]="['tables/categories/'+AdminCategoryEnum.Category,  {outlets: {tablesOutlet: null}}]" >Categories</li>
				</ul>
				<ul>
					<li [routerLink]="['tables/users/'+AdminCategoryEnum.User, {outlets: {tablesOutlet: null}}]" >Users</li>
				</ul>
				<ul>
					<li [routerLink]="['tables/' ]">Back</li>
				</ul>
			</div>
			<div class="col-10">
				<router-outlet></router-outlet>
				<!-- The modal -->
				<router-outlet name='tablesOutlet'></router-outlet>
			</div>
		</div>
    </div>
</ng-container>
