<ng-container *ngIf="{
	noooothing: populateForm$ | async,
	formValue: formValue$ | async
} as source">
<pre>{{source.noooothing | json}}</pre>
source.formValue.value: <pre>{{source.formValue | json}}</pre>
source.formValue.invalid: <pre>{{source.formValue.invalid | json}}</pre>
<form [formGroup]="form" (submit)="onSubmit(source.formValue)">
	<div class="controls-container">
		<!-- <input hidden formControlName="categoryName" [value]="source.formValue.value.category" matInput> -->

		<mat-form-field class="w-100">
			<input formControlName="id" [readonly]="true" matInput placeholder="RecordID">
		</mat-form-field>

		<mat-form-field class="w-100">
			<input formControlName="title" matInput placeholder="Title">
			<mat-error>This field is mandatory.</mat-error>
		</mat-form-field>

		<mat-form-field class="w-100">
			<input formControlName="band" matInput placeholder="Band">
			<mat-error>This field is mandatory.</mat-error>
		</mat-form-field>

		<mat-form-field class="w-100">
			<input formControlName="album" matInput placeholder="Album">
			<mat-error>This field is mandatory.</mat-error>
		</mat-form-field>

		<mat-form-field class="w-100">
			<input formControlName="year" matInput placeholder="Year">
			<mat-error>This field is mandatory.</mat-error>
		</mat-form-field>

		<mat-select formControlName="genre" placeholder="Genre" *ngIf="category$ | async; let category">
			<mat-option *ngFor="let subCategory of category.subCategories" [value]="subCategory.name">
				{{ subCategory.name }}
			</mat-option>
		</mat-select>

		<mat-form-field class="w-100">
			<input formControlName="price" matInput placeholder="Price">
			<mat-error>Invalid email address.</mat-error>
		</mat-form-field>

		<mat-form-field class="w-100">
			<input formControlName="description" matInput placeholder="Description">
		</mat-form-field>

		<div class="d-flex justify-content-center w-100">
			<img [src]="(imgSrcReplay$ | async) || defaultimageRootPath" (click)="fileInput.click()" style="width: 250px; height: 200px">
		</div>

		<label>Select file to upload</label>
		<br>
		<input ngInput #fileInput type="file" accept="image/*" (change)="showPreview(fileInput.files[0])">

		<div class="button-row">
			<button mat-raised-button color="primary" type="submit"
				[disabled]="form.invalid">Submit</button>
			<button mat-raised-button color="warn" type='button' (click)="onClear()">Clear</button>
		</div>
	</div>
</form>
