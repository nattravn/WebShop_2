<ng-container
	*ngIf="{
		noooothing: populateForm$ | async,
		formValue: formValue$ | async
	} as source"
>
	<form [formGroup]="productDialogService.clothingForm" class="normal-form">
		<div class="controls-container">
			<mat-form-field class="w-100">
				<mat-label>Size</mat-label>
				<input formControlName="size" matInput placeholder="Size" />
			</mat-form-field>
		</div>
	</form>
</ng-container>
