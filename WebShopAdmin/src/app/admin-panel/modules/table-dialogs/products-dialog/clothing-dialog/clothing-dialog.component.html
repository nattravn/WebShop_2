<ng-container
	*ngIf="{
		noooothing: populateForm$ | async,
		formValue: formValue$ | async
	} as source"
>
	<pre>{{ source.formValue | json }}</pre>
	<form [formGroup]="form" class="normal-form" (submit)="onSubmit(source.formValue)">
		<div class="controls-container">
			<mat-form-field class="w-100">
				<mat-label>Size</mat-label>
				<input formControlName="size" matInput placeholder="Size" />
			</mat-form-field>
		</div>
	</form>
</ng-container>
