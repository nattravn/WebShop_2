<div class="container float-left">
	<div class="search-div">
		<button mat-raised-button (click)="onCreate()"><mat-icon>add</mat-icon>Create</button>
		<mat-form-field class="search-form-field" floatLabel="never">
			<input matInput [(ngModel)]="searchKey" placeholder="Search" autocomplete="off" (keyup)="applyFilter()" />
			<button mat-button matSufix mat-icon-button aria-label="Clear" *ngIf="searchKey" (click)="onSearchClear()">
				<mat-icon>close</mat-icon>
			</button>
		</mat-form-field>
	</div>

	<div class="mat-elevation-z8">
		<table mat-table [dataSource]="categoryListService.tableData | async" multiTemplateDataRows #outerSort="matSort" matSort>
			<ng-container matColumnDef="{{ column }}" *ngFor="let column of columnsToDisplay">
				<th mat-header-cell *matHeaderCellDef mat-sort-header>{{ column }}</th>
				<td mat-cell *matCellDef="let element">
					{{ element[column] }}
					<ng-container *ngIf="column === 'actions'">
						<a class="btn btn-sm btn-info text-white" (click)="onEdit(element)"><i class="fa fa-pencil"></i></a>
						<a class="btn btn-sm btn-danger text-white ml-1" (click)="onDelete(element)"><i class="fa fa-trash"></i></a>
					</ng-container>
				</td>
			</ng-container>

			<!-- Expanded Content Column - The detail row is made up of this one column that spans across all columns -->
			<ng-container matColumnDef="expandedDetail">
				<td mat-cell *matCellDef="let element" [attr.colspan]="columnsToDisplay.length">
					<div
						class="example-element-detail"
						*ngIf="element.subCategories.length"
						[@detailExpand]="element === expandedElement ? 'expanded' : 'collapsed'"
					>
						<div class="inner-table">
							<table #innerTables mat-table #innerSort="matSort" [dataSource]="element.subCategories" matSort>
								<ng-container matColumnDef="{{ innerColumn }}" *ngFor="let innerColumn of innerDisplayedColumns">
									<th mat-header-cell *matHeaderCellDef mat-sort-header>{{ innerColumn }}</th>
									<td mat-cell *matCellDef="let element">{{ element[innerColumn] }}</td>
								</ng-container>
								<tr mat-header-row *matHeaderRowDef="innerDisplayedColumns"></tr>
								<tr mat-row *matRowDef="let row; columns: innerDisplayedColumns"></tr>
							</table>
						</div>
					</div>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
			<tr mat-row *matRowDef="let element; columns: columnsToDisplay" (click)="toggleRow(element)"></tr>
			<tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
		</table>
		<mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [pageSize]="5" showFirstLastButtons></mat-paginator>
	</div>
</div>
